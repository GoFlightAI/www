name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC handshake with AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::138893339755:role/gha-www-deployer
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync . s3://goflight-frontend-prod-138893339755 --exclude ".git/*" --exclude ".github/*" --exclude "*.py" --exclude "lambda_functions/*" --exclude "README.md" --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1XKI7Q9ZCX56P --paths "/*"
